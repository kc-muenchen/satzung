name: Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Typst
      run: |
        wget https://github.com/typst/typst/releases/download/v0.14.2/typst-x86_64-unknown-linux-musl.tar.xz
        tar -xf typst-x86_64-unknown-linux-musl.tar.xz
        sudo mv typst-x86_64-unknown-linux-musl/typst /usr/local/bin/

    - name: Build PDF
      run: |
        typst compile satzung.typ

    - name: Upload PDF
      uses: actions/upload-artifact@v4
      with:
        name: satzung-pdf
        path: satzung.pdf

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download PDF artifact
      uses: actions/download-artifact@v4
      with:
        name: satzung-pdf

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: npm ci

    - name: Run Semantic Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: npx semantic-release

    - name: Get release version
      id: get_version
      run: |
        VERSION=$(git describe --tags --abbrev=0)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Released version: $VERSION"

    - name: Rename PDF with version
      run: |
        mv satzung.pdf satzung-${{ steps.get_version.outputs.version }}.pdf

    - name: Upload PDF to Nextcloud
      uses: trympet/nextcloud-artifacts-action@v2
      with:
        name: 'Satzung/satzung-${{ steps.get_version.outputs.version }}'
        path: 'satzung-${{ steps.get_version.outputs.version }}.pdf'
        nextcloud-url: ${{ secrets.NEXTCLOUD_URL }}
        nextcloud-username: ${{ secrets.NEXTCLOUD_USERNAME }}
        nextcloud-password: ${{ secrets.NEXTCLOUD_PASSWORD }}
